<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNITCH Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      padding: 24px;
    }
    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    h1, h2 {
      margin-top: 0;
    }
    .muted {
      color: #94a3b8;
    }
    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #1e293b;
      color: #cbd5e1;
      font-size: 12px;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>SNITCH Alert Dashboard</h1>
    <div class="pill">Starter Version</div>
    <div class="pill">GitHub Pages</div>
    <p class="muted">This is the first live version of your dashboard.</p>
  </div>

  <div class="card">
    <h2>Trade Focus Now</h2>
    <p>WETH - Wait for confirmation</p>
  </div>

  <div class="card">
    <h2>Emerging Potential</h2>
    <p>SAPIEN - Keep on watch</p>
  </div>

  <div class="card">
    <h2>Caution / Avoid</h2>
    <p>SOL - Reduce risk</p>
  </div>
</body>
</html>
