name: Update dashboard data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update dashboard JSON
        run: |
          mkdir -p docs/data
          cat > docs/data/dashboard-current.json <<'EOF'
          {
            "meta": {
              "product": "SNITCH Alert Dashboard",
              "mode": "Live Monitor",
              "marketBias": "Neutral",
              "asOf": "Updated by GitHub Actions",
              "dataSource": "GitHub Actions"
            },
            "metrics": {
              "qualifiedSignals": 2,
              "tradeFocus": 1,
              "emerging": 1,
              "caution": 0,
              "avgConfidence": 71,
              "winRate30d": 59
            },
            "tradeFocusNow": [
              {
                "token": "WETH",
                "pair": "WETH/USDC",
                "action": "Prepare Entry",
                "actionShort": "WAIT FOR CONFIRMATION",
                "confidence": "Medium",
                "score": 7.4,
                "direction": "Buy Pressure",
                "impactPct": 0.91,
                "tradeUsd": 31250,
                "risk": "Medium",
                "why": "Updated sample signal from GitHub Actions.",
                "nextStep": "Open chart now and wait for confirmation.",
                "doNot": "Do not chase spike.",
                "cancelIf": "Cancel if buy flow fades."
              }
            ],
            "emergingPotential": [
              {
                "token": "LINK",
                "pair": "LINK/USDC",
                "action": "Keep On Watch",
                "actionShort": "WATCH",
                "confidence": "Medium",
                "score": 5.6,
                "direction": "Buy Pressure",
                "impactPct": 0.31,
                "tradeUsd": 4200,
                "risk": "Medium",
                "why": "Early setup still needs confirmation.",
                "nextStep": "Watch next 15–30 minutes.",
                "doNot": "Do not enter big size yet.",
                "cancelIf": "Cancel if follow-through fails."
              }
            ],
            "cautionAvoid": [],
            "recentSignals": [
              {
                "time": "Auto",
                "token": "WETH",
                "pair": "WETH/USDC",
                "direction": "Buy Pressure",
                "action": "WAIT FOR CONFIRMATION",
                "score": 7.4,
                "impact": "0.91%",
                "usd": "$31.25K"
              }
            ],
            "performance": {
              "scoreTrend": [],
              "actionMix": [
                { "name": "Prepare / Wait", "value": 50 },
                { "name": "Watch", "value": 35 },
                { "name": "Avoid / Reduce", "value": 15 }
              ],
              "proof": [
                { "metric": "Qualified Signals", "value": "2" },
                { "metric": "30D Win Rate", "value": "59%" },
                { "metric": "Avg Confidence", "value": "71/100" },
                { "metric": "Risk-Off Alerts", "value": "0" }
              ]
            }
          }
          EOF

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/dashboard-current.json
          git diff --cached --quiet || git commit -m "Auto update dashboard JSON"
          git push
