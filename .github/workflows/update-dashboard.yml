name: Update dashboard data and build site

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build signals input
        run: python build_signals_input.py

      - name: Run collector
        run: python collector.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: npm install

      - name: Build Vite app
        run: npm run build

      - name: Copy generated JSON into built site
        run: |
          mkdir -p docs/data
          cp generated/dashboard-current.json docs/data/dashboard-current.json

      - name: Commit updated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs signals-input.json
          git diff --cached --quiet || git commit -m "Auto update dashboard site"
          git push
